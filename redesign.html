<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peck Deck — mvogts</title>
<!-- Preconnect to all external domains so DNS + TLS handshakes happen immediately -->
<link rel="icon" type="image/png" href="icon.png?v=4">
<link rel="apple-touch-icon" href="icon.png?v=4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Peck Deck">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://docs.google.com">
<link rel="preconnect" href="https://api.ebird.org">
<link rel="preconnect" href="https://en.wikipedia.org">
<link rel="preconnect" href="https://api.inaturalist.org">
<link rel="preconnect" href="https://inaturalist-open-data.s3.amazonaws.com">
<link rel="preconnect" href="https://cdn.download.ams.birds.cornell.edu">
<link rel="dns-prefetch" href="https://upload.wikimedia.org">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&family=Spectral:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #f5f0e8;
    --bg2:        #ede8dc;
    --cream:      #f4edd8;
    --cream-dark: #e8dfc4;
    --gold:       #8a6a20;
    --gold-soft:  #a08040;
    --ink:        #1e160a;
    --ink-soft:   #6a5830;
    --green:      #2a5a1a;
    --green-mid:  #3a7228;
    --green-text: #1a3a0a;
    --green-soft: #4a7a30;
    --border:     #d8ceb8;
    --text:       #1a1208;
    --text-soft:  #6a5a38;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 32px 32px;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stats {
    display: flex;
    gap: 32px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .stat-block { text-align: right; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
  }
  .stat-label {
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-top: 3px;
  }

  .header-rule {
    width: 100%;
    height: 1px;
    background: var(--border);
  }

  /* ── CONTROLS BAR ── */
  .controls-bar {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* Search */
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
    max-width: 280px;
  }

  .search-input {
    width: 100%;
    background: white;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 7px 10px 7px 28px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--green); }
  .search-input::placeholder { color: #b0a080; }

  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: #4a4030;
    font-size: 10px;
    pointer-events: none;
  }

  /* Sort */
  .sort-select {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-soft);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 4px 20px 4px 0;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .sort-select:focus { border-bottom-color: var(--green); }

  /* Filter buttons */
  .filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-soft);
  }

  .filter-btn {
    background: white;
    border: 1px solid var(--border);
    color: var(--text-soft);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--green); color: var(--green); }
  .filter-btn.active { background: var(--green); border-color: var(--green); color: white; }

  /* Rarity-specific active tints */
  .filter-btn[data-filter="Common"].active     { background: #daf0c8; border-color: #90c860; color: #1a4a08; }
  .filter-btn[data-filter="Uncommon"].active   { background: #d0e8f8; border-color: #70aad8; color: #0a3068; }
  .filter-btn[data-filter="Rare"].active       { background: #fae8c8; border-color: #d8a050; color: #6a3808; }
  .filter-btn[data-filter="Very Rare"].active  { background: #f8dce8; border-color: #d080a8; color: #681838; }

  /* ── PACKS ── */
  .packs-section {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 32px;
  }

  .packs-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0 0 12px;
  }

  .packs-toggle-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
  }

  .packs-toggle-arrow {
    font-size: 8px;
    color: var(--gold-soft);
    transition: transform 0.2s;
  }

  .packs-toggle.open .packs-toggle-arrow { transform: rotate(180deg); }

  .packs-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }

  .packs-grid.open { display: grid; }

  .pack-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .pack-card:hover { border-color: var(--green); }
  .pack-card.active { border-color: var(--green); background: #eaf5e0; }

  .life-list-pill {
    border-width: 2px;
    border-color: var(--green);
  }
  .life-list-pill .pack-name { color: var(--green); }

  .pack-type {
    font-size: 6px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-soft);
    margin-bottom: 4px;
  }

  .pack-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .pack-progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 5px;
    overflow: hidden;
  }

  .pack-progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .pack-count { font-size: 8px; color: var(--text-soft); letter-spacing: 0.06em; }
  .pack-count strong { color: var(--green); }
  .pack-loading { font-size: 8px; color: #b0a080; font-style: italic; }

  .packs-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
    margin-bottom: 16px;
  }

  /* ── GALLERY ── */
  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  /* ── CARD ── */
  .scene {
    aspect-ratio: 5 / 7.5;
    perspective: 1000px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.15s ease, filter 0.15s ease;
    will-change: transform;
  }

  .scene:hover {
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.15)) drop-shadow(0 4px 8px rgba(0,0,0,0.08));
  }

  .scene:active {
    transform: scale(0.97) translateY(2px) !important;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1)) !important;
    transition: transform 0.08s ease, filter 0.08s ease;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
  }

  .scene.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* FRONT */
  .card-front {
    background: var(--cream);
    border: 1px solid #c4a86a;
    display: flex;
    flex-direction: column;
    padding: 12px;
    transition: background 0.2s ease;
  }

  .card-eyebrow {
    font-size: 7.5px;
    letter-spacing: 0.14em;
    color: var(--ink);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: 700;
    opacity: 0.7;
    position: relative;
    z-index: 2;
  }

  .card-num {
    font-size: 6px;
    color: var(--gold-soft);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .card-rule {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, #c4a86a, transparent);
    margin-bottom: 10px;
  }

  .photo-frame {
    flex: 1;
    position: relative;
    border-radius: 3px;
    overflow: hidden;
    background: var(--cream-dark);
    margin-bottom: 10px;
    position: relative;
    z-index: 2;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .photo-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(120,100,50,0.2) 100%);
    pointer-events: none;
  }

  .photo-credit {
    position: absolute;
    bottom: 4px;
    right: 6px;
    font-size: 6px;
    color: rgba(255,255,255,0.55);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    z-index: 2;
  }

  .no-photo {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-soft);
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-name {
    font-family: 'Spectral', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    text-align: center;
    line-height: 1.15;
    position: relative;
    z-index: 2;
  }

  .card-sci {
    font-family: 'Spectral', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 10px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 2px;
    position: relative;
    z-index: 2;
  }

  .card-sighting-label {
    font-size: 6px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-top: 6px;
    margin-bottom: 3px;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    position: relative;
    z-index: 2;
  }

  .card-loc {
    font-size: 6px;
    color: var(--gold-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-date {
    font-size: 6px;
    color: var(--gold-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .rarity-badge {
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .rarity-Common    { background: var(--green); color: var(--green-text); }
  .rarity-Uncommon  { background: #3a5020; color: #a8d080; }
  .rarity-Rare      { background: #5a2a10; color: #e09060; }
  .rarity-Very-Rare { background: #4a1030; color: #e080c0; }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    opacity: 0.35;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .c-tl { top: 8px; left: 8px; }
  .c-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .c-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .c-br { bottom: 8px; right: 8px; transform: scale(-1); }

  /* BACK */
  .card-back {
    background: var(--green);
    border: 1px solid var(--green-mid);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
  }

  .back-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 9px;
  }

  .back-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: #e8dcc0;
    line-height: 1.1;
  }

  .back-sci {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 8px;
    color: var(--green-soft);
    margin-top: 2px;
  }

  .back-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--green-mid), transparent);
    margin-bottom: 9px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    margin-bottom: 2px;
  }

  .stat-item-label {
    font-size: 6px;
    color: var(--green-soft);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .stat-item-value {
    font-size: 9px;
    color: var(--green-text);
    font-weight: 700;
    line-height: 1.2;
  }

  .back-desc {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    line-height: 1.6;
    color: #b8d098;
    flex: 1;
    margin-top: 4px;
  }

  .back-desc.loading { color: var(--green-soft); font-style: italic; font-size: 10px; }

  .sighting-footer {
    margin-top: 10px;
    padding-top: 9px;
    border-top: 1px solid #2a4020;
  }

  .sighting-label {
    font-size: 6px;
    color: var(--green-soft);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sighting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sighting-loc  { font-size: 8px; color: var(--green-text); }
  .sighting-date { font-size: 8px; color: var(--green-soft); }

  .back-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .back-footer span {
    font-size: 6px;
    color: #3a5030;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── LIGHTBOX MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8, 8, 6, 0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal-card-wrap {
    position: relative;
    width: min(460px, 92vw);
    height: min(690px, 90vh);
    animation: zoomIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes zoomIn {
    0%   { transform: scale(0.82) translateY(12px); opacity: 0; }
    70%  { transform: scale(1.02) translateY(-2px); opacity: 1; }
    100% { transform: scale(1)    translateY(0);    opacity: 1; }
  }

  .modal-card-wrap #modal-card-content {
    width: 100%;
    height: 100%;
  }

  .modal-card-wrap .scene {
    width: 100% !important;
    height: 100% !important;
    aspect-ratio: unset !important;
    perspective: 1000px;
  }

  .modal-card-wrap .card-inner {
    width: 100%;
    height: 100%;
  }

  .modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: #6a5830;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--cream); }

  .modal-hint {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    color: #4a4030;
    white-space: nowrap;
  }

  #modal-card-inner.flipped { transform: rotateY(180deg); }

  /* Larger text inside modal for readability */
  .modal-card-wrap .card-name     { font-size: 30px; }
  .modal-card-wrap .card-sci      { font-size: 16px; }
  .modal-card-wrap .card-eyebrow  { font-size: 11px; }
  .modal-card-wrap .card-loc,
  .modal-card-wrap .card-date     { font-size: 10px; }
  .modal-card-wrap .rarity-badge  { font-size: 10px; padding: 4px 11px; }
  .modal-card-wrap .season-pill   { font-size: 10px; padding: 4px 11px; }
  .modal-card-wrap .card-sighting-label { font-size: 10px; }
  .modal-card-wrap .back-name     { font-size: 26px; }
  .modal-card-wrap .back-sci      { font-size: 14px; }
  .modal-card-wrap .stat-item-label { font-size: 10px; }
  .modal-card-wrap .stat-item-value { font-size: 16px; }
  .modal-card-wrap .back-desc     { font-size: 15px; line-height: 1.7; }
  .modal-card-wrap .seasonal-label { font-size: 10px; }
  .modal-card-wrap .seasonal-emoji { font-size: 17px; }
  .modal-card-wrap .seasonal-dot { font-size: 12px; }
  .modal-card-wrap .sighting-loc,
  .modal-card-wrap .sighting-date { font-size: 13px; }
  .modal-card-wrap .sighting-label { font-size: 10px; }
  .modal-card-wrap .back-footer span { font-size: 10px; }
  .modal-card-wrap .photo-credit  { font-size: 8px; }

  /* ── SEASON PILL ── */
  .season-pill {
    font-family: 'Space Mono', monospace;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--green);
    color: var(--green-text);
    flex-shrink: 0;
  }

  .season-badge {
    font-size: 13px;
    line-height: 1;
    flex-shrink: 0;
  }

  /* ── PACK SKINS ── */
  /* Texture layer sits behind content */
  .card-texture {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .tex-grid {
    opacity: 0.5;
    background-image:
      linear-gradient(#c2ccc8 1px, transparent 1px),
      linear-gradient(90deg, #c2ccc8 1px, transparent 1px);
    background-size: 16px 16px;
  }
  .tex-woodgrain {
    opacity: 0.4;
    background-image: repeating-linear-gradient(88deg,
      #e4d7b4 0px, #efe4c8 3px, #e4d7b4 6px, #e9ddbd 11px);
  }

  /* Motif — one ghosted place-object */
  .card-motif {
    position: absolute;
    z-index: 0;
    right: 14px;
    top: 34px;
    width: 64px;
    height: 64px;
    pointer-events: none;
  }

  /* Brooklyn skin — flat forest (Prospect Park) version for grid */
  .card-front.skin-brooklyn { background: #f1ecd8; border-color: #3f5a34; }
  .skin-brooklyn .card-motif { fill: #3f5a2e; color: #3f5a2e; opacity: 0.12; }

  /* ── STACKED CARDS ── */
  .stack-scene {
    aspect-ratio: 5 / 7.5;
    position: relative;
    cursor: pointer;
  }

  /* Ghost cards peeking behind */
  .stack-scene .stack-ghost {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    background: var(--cream-dark);
    border: 1px solid #c4a86a;
    transform-origin: bottom center;
  }

  .stack-scene .stack-ghost:nth-child(1) {
    transform: rotate(2.5deg) translateY(-4px) translateX(4px);
    opacity: 0.7;
    z-index: 1;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .stack-scene .stack-ghost:nth-child(2) {
    transform: rotate(-1.5deg) translateY(-2px) translateX(-3px);
    opacity: 0.5;
    z-index: 0;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) 0.04s;
  }

  .stack-scene:hover .stack-ghost:nth-child(1) {
    transform: rotate(6deg) translateY(-12px) translateX(10px);
    opacity: 0.65;
  }

  .stack-scene:hover .stack-ghost:nth-child(2) {
    transform: rotate(-4deg) translateY(-8px) translateX(-8px);
    opacity: 0.45;
  }

  /* Count badge on stacked cards */
  .stack-count {
    position: absolute;
    top: -8px;
    right: -8px;
    width: 22px;
    height: 22px;
    background: var(--gold);
    color: var(--ink);

    justify-content: center;
    z-index: 10;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);

    position: absolute;
    inset: 0;
    z-index: 2;
    aspect-ratio: unset;
  }

  try {

    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);

// ── eBird API with caching ──
async function ebirdFetch(path) {
  const cacheKey = 'ebird_' + path;
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  const res = await fetch(`https://api.ebird.org/v2${path}`, {
    headers: { 'X-eBirdApiToken': EBIRD_KEY }
  });
  if (!res.ok) return null;

  const isJson = res.headers.get('content-type')?.includes('json');
  const data = isJson ? await res.json() : await res.text();
  cacheSet(cacheKey, data);
  return data;
}

// Get species codes for a region (returns ordered array)
async function getRegionSpeciesCodes(regionCode) {
  const data = await ebirdFetch(`/product/spplist/${regionCode}`);
  return Array.isArray(data) ? data : [];
}

// Get full taxonomy (cached aggressively — changes rarely)
async function getTaxonomy() {
  const cacheKey = 'ebird_taxonomy';
  const cached = cacheGet(cacheKey, 7 * 24 * 60 * 60 * 1000); // 7 days
  if (cached) return cached;

  const data = await ebirdFetch(`/ref/taxonomy/ebird?fmt=json&locale=en`);
  if (!Array.isArray(data)) return [];
  const map = {};
  data.forEach(t => { map[t.speciesCode] = t; });
  cacheSet(cacheKey, map);
  return map;
}

  // Hotspot packs — exact locId match
  if (packId.startsWith('L')) {

  // All other packs — use loc ID region lookup with regionMatches helper
  return allBirds.filter(b => regionMatches(getRegionCode(b), packId));
}

// ── Build ghost cards for unseen species ──
async function getUnseenForPack(packId, myBirds) {
  const [codes, taxMap] = await Promise.all([
    getRegionSpeciesCodes(packId),
    getTaxonomy()
  ]);

  const mySpeciesCodes = new Set(myBirds.map(b => b.speciesCode).filter(Boolean));
  const myNames = new Set(myBirds.map(b => b.commonName.toLowerCase()));

  return codes
    .filter(code => {
      const t = taxMap[code];
      return t && t.category === 'species' &&
        !mySpeciesCodes.has(code) &&
        !myNames.has((t.comName || '').toLowerCase());
    })
    .map(code => taxMap[code]);

function daysSince(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return '1 day ago';
  if (diff < 30) return `${diff} days ago`;
  if (diff < 365) return `${Math.floor(diff/30)}mo ago`;
  const y = Math.floor(diff/365);
  return `${y}yr${y > 1 ? 's' : ''} ago`;
}

function getSeasonalPresence(speciesCode, country, date) {
  if (!speciesCode || !country) return null;
  const c2 = country.split('-')[0];

  // Try hardcoded lookup first
  const hardcoded = SEASONAL_PRESENCE[`${speciesCode}_${c2}`] || null;
  if (hardcoded) return hardcoded;

  // Fallback for unknown species: derive from sighting date
  // Mark the sighting season as present, others as unknown (◐)
  if (!date) return null;
  const month = parseInt(date.split('-')[1], 10);
  const sightingSeason =
    [3,4,5].includes(month) ? 'spring' :
    [6,7,8].includes(month) ? 'summer' :
    [9,10,11].includes(month) ? 'fall' : 'winter';

  // For tropical/year-round regions, mark all as present
  const yearRound = ['BL','BR','MX','CL'].includes(c2);
  if (yearRound) {
    return { spring:'present', summer:'present', fall:'present', winter:'present' };
  }

  // For temperate regions, mark sighting season as present, others unknown
  return {
    spring: sightingSeason === 'spring' ? 'present' : 'rare',
    summer: sightingSeason === 'summer' ? 'present' : 'rare',
    fall:   sightingSeason === 'fall'   ? 'present' : 'rare',
    winter: sightingSeason === 'winter' ? 'present' : 'rare',
  };
}

function seasonalPresenceHTML(presence) {
  if (!presence) return '';
  const dot = { present: '●', rare: '◐', absent: '○' };
  const seasons = [
    { key:'spring', emoji:'🌸' },
    { key:'summer', emoji:'☀️' },
    { key:'fall',   emoji:'🍁' },
    { key:'winter', emoji:'❄️' },
  ];
  return `
    <div class="seasonal-label">Seasonal Presence</div>
    <div class="seasonal-dots">
      ${seasons.map(s => `
        <div class="seasonal-item ${presence[s.key]||'absent'}">
          <span class="seasonal-emoji">${s.emoji}</span>
          <span class="seasonal-dot">${dot[presence[s.key]]||'○'}</span>
        </div>`).join('')}
    </div>`;
}
const descCache = {};

async function fetchDescription(sciName, commonName) {
  const key = sciName || commonName;
  if (descCache[key]) return descCache[key];

  for (const term of [sciName.replace(/ /g,'_'), commonName.replace(/ /g,'_')]) {
    try {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.extract && data.type !== 'disambiguation') {
        const sentences = data.extract.match(/[^.!?]+[.!?]+/g) || [];
        const desc = sentences.slice(0, 2).join(' ').trim();
        if (desc.length > 20) { descCache[key] = desc; return desc; }
      }
    } catch(e) {}
  }

  descCache[key] = 'A species recorded on your eBird life list.';
  return descCache[key];
}

// ── Group birds by species for stacking ──
function groupBySpecies(birds) {
  const groups = {};
  const order = [];
  birds.forEach(b => {
    // Group by speciesCode + locId so same species at different locations stack
    // but same species at SAME location on different dates don't stack
    const specKey = b.speciesCode || b.commonName;
    const locKey = b.locId || b.location;
    const key = specKey + '_' + locKey;
    if (!groups[key]) { groups[key] = []; }
    // Track first occurrence for ordering
    const speciesOrder = specKey;
    if (!groups['__order__']) groups['__order__'] = [];
    if (!groups['__seen__']) groups['__seen__'] = new Set();
    if (!groups['__seen__'].has(specKey)) {
      groups['__seen__'].add(specKey);
      groups['__order__'].push(specKey);
    }
    groups[key].push(b);
  });

  // Now regroup by species only, collecting all location groups
  const speciesGroups = {};
  Object.keys(groups).forEach(k => {
    if (k.startsWith('__')) return;
    const specKey = k.split('_')[0];
    if (!speciesGroups[specKey]) speciesGroups[specKey] = [];
    // Add first bird from each location group as representative
    speciesGroups[specKey].push(groups[k][0]);
  });

  return (groups['__order__'] || []).map(k => speciesGroups[k] || []).filter(g => g.length > 0);
}

// Premium card: tilt toward cursor + move the specular sheen (modal only)
function attachPremiumTilt() {
  const inner = document.getElementById('modal-card-inner');
  const sheenFront = document.getElementById('pk-sheen');
  const sheenBack = document.getElementById('pk-sheen-back');
  if (!inner || !sheenFront) return; // only present for premium cards

  const scene = inner.parentElement;
  const SLOW = 'transform 0.65s cubic-bezier(0.4,0.2,0.2,1)';
  const FAST = 'transform 0.08s ease-out';
  scene.onmousemove = (e) => {
    const flipped = inner.classList.contains('flipped');
    const r = inner.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width;
    const py = (e.clientY - r.top) / r.height;
    const ry = (px - 0.5) * 18;
    const rx = (0.5 - py) * 13;
    inner.style.transition = FAST; // responsive tilt
    const base = flipped ? 180 : 0;
    inner.style.transform = `rotateY(${base + ry}deg) rotateX(${rx}deg)`;
    const s = flipped ? sheenBack : sheenFront;
    if (s) {
      const mx = flipped ? (100 - px*100) : (px*100);
      s.style.setProperty('--mx', mx + '%');
      s.style.setProperty('--my', (py*100) + '%');
    }
  };
  scene.onmouseleave = () => {
    const flipped = inner.classList.contains('flipped');
    inner.style.transition = SLOW; // smooth settle
    inner.style.transform = flipped ? 'rotateY(180deg)' : '';
  };
}

function openModalGroup(indices, pos) {
  modalGroupIndices = indices;
  modalGroupPos = pos;
  const bird = allBirds[indices[pos]];
  if (!bird) return;

  modalFlipped = false;
  const content = document.getElementById('modal-card-content');
  content.innerHTML = buildModalCardHTML(bird, indices[pos]);
  attachPremiumTilt();

  const inner = document.getElementById('modal-card-inner');
  if (inner) inner.classList.remove('flipped');

  const img = content.querySelector('img[data-src]');
  if (img) { img.src = img.dataset.src; img.removeAttribute('data-src'); }

  // Update or create navigator
  let nav = document.getElementById('modal-nav');
  if (!nav) {
    nav = document.createElement('div');
    nav.id = 'modal-nav';
    nav.className = 'modal-nav';
    document.getElementById('modal-card-wrap').appendChild(nav);
  }

  if (indices.length > 1) {
    nav.style.display = 'flex';
    nav.innerHTML = `
      <button class="modal-nav-btn" onclick="navigateModal(-1)" ${pos === 0 ? 'disabled' : ''}>←</button>
      <span class="modal-nav-indicator">${pos + 1} / ${indices.length} sightings</span>
      <button class="modal-nav-btn" onclick="navigateModal(1)" ${pos === indices.length - 1 ? 'disabled' : ''}>→</button>
    `;
  } else {
    nav.style.display = 'none';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  fetchDescription(bird.sciName, bird.commonName).then(desc => {
    const descEl = document.getElementById('modal-desc');
    if (descEl && descEl.classList.contains('loading')) {
      descEl.textContent = desc;
      descEl.classList.remove('loading');
    }
  });

  const presence = getSeasonalPresence(bird.speciesCode, bird.country, bird.date);
  const modalSeasonal = document.getElementById('modal-seasonal');
  if (modalSeasonal && presence) modalSeasonal.innerHTML = seasonalPresenceHTML(presence);
}

  openModalGroup(modalGroupIndices, newPos);

async function handleFlip(el, sciName, commonName, index) {

// ── State ──
let allBirds = [];
let activeFilter = 'all';
let activeSearch = '';
let activeSort = 'default';
let currentPackId = 'lifelist';
let packState = null;

// ── Filtering + sorting ──
const RARITY_ORDER = { 'Very Rare': 0, 'Rare': 1, 'Uncommon': 2, 'Common': 3, 'Unknown': 4 };

function applyFiltersAndSort(birds) {
  let result = [...birds];

  // Search
  if (activeSearch) {
    const q = activeSearch.toLowerCase();
    result = result.filter(b =>
      b.commonName.toLowerCase().includes(q) ||
      b.sciName.toLowerCase().includes(q) ||
      (b.family || '').toLowerCase().includes(q) ||
      (b.order || '').toLowerCase().includes(q)
    );
  }

  // Rarity filter
  if (activeFilter !== 'all') {
    result = result.filter(b => b.rarity === activeFilter);
  }

  // Sort
  switch(activeSort) {
    case 'name':
      result.sort((a,b) => a.commonName.localeCompare(b.commonName)); break;
    case 'date-asc':
      result.sort((a,b) => (a.date||'').localeCompare(b.date||'')); break;
    case 'date-desc':
      result.sort((a,b) => (b.date||'').localeCompare(a.date||'')); break;
    case 'rarity':
      result.sort((a,b) => (RARITY_ORDER[a.rarity]??3) - (RARITY_ORDER[b.rarity]??3)); break;
    case 'taxon':
      result.sort((a,b) => parseFloat(a.taxonOrder||9999) - parseFloat(b.taxonOrder||9999)); break;
  }

  return result;
}

function handleSearch() {
  activeSearch = document.getElementById('search-input').value.trim();
  currentPackId = null;
  document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
  renderGallery(applyFiltersAndSort(allBirds));
}

function handleSort() {
  activeSort = document.getElementById('sort-select').value;
  if (currentPackId && packState) {
    renderPackGallery(packState.myBirds, packState.unseenSpecies, false);
  } else {
    renderGallery(applyFiltersAndSort(allBirds));
  }
}

// ── Intersection Observer for lazy card photo loading ──
// Images only load when a card scrolls into the viewport
let cardObserver = null;

function setupCardObserver() {
  if (cardObserver) cardObserver.disconnect();
  cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target.querySelector('img[data-src]');
      if (img) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      cardObserver.unobserve(entry.target);
    });
  }, { rootMargin: '200px' }); // start loading 200px before entering viewport

  document.querySelectorAll('.scene').forEach(el => cardObserver.observe(el));
}

function renderGallery(birds) {
  const gallery = document.getElementById('gallery');
  if (!gallery) return;
  if (!birds || !birds.length) {
    gallery.innerHTML = `<div class="error-msg"><strong>No cards found</strong><p>Try a different search or filter.</p></div>`;
    return;
  }
  // Group by species to show stacks for multi-location sightings
  const groups = groupBySpecies(birds);
  gallery.innerHTML = groups.map(group => {
    if (group.length === 1) {
      return cardHTML(group[0], allBirds.indexOf(group[0]));
    } else {
      return stackHTML(group);
    }
  }).join('');
  setupCardObserver();
}

// ── Filters ──
function setupFilters() {
  const bar = document.getElementById('controls-bar');
  if (bar) bar.style.display = 'flex';
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      currentPackId = null;
      document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
      renderGallery(applyFiltersAndSort(allBirds));
    });
  });
}

// ── Packs ──
let packsOpen = true;
let packsLoaded = false;

function togglePacks() {
  packsOpen = !packsOpen;
  document.getElementById('packs-toggle').classList.toggle('open', packsOpen);
  document.getElementById('packs-grid').classList.toggle('open', packsOpen);

  // Lazy-load pack counts only when packs panel is first opened
  if (packsOpen && !packsLoaded) {
    packsLoaded = true;
    loadPackCounts();
  }
}

// Render pack shells immediately (no API calls) so layout is instant
function renderPackShells() {
  const grid = document.getElementById('packs-grid');

  // Life List pill — always first, acts as "show everything" filter
  const lifeListPill = `
    <div class="pack-card life-list-pill active" id="pack-lifelist" onclick="filterByPack('lifelist')">
      <div class="pack-type">📖 Full Collection</div>
      <div class="pack-name">Life List</div>
      <div class="pack-progress-bar"><div class="pack-progress-fill" style="width:100%"></div></div>
      <div class="pack-count"><strong>${allBirds.length}</strong> species total</div>
    </div>`;

  const packPills = PACKS.map(pack => `
    <div class="pack-card" id="pack-${pack.id}" onclick="filterByPack('${pack.id}')">
      <div class="pack-type">${pack.emoji} ${pack.type}</div>
      <div class="pack-name">${pack.name}</div>
      <div class="pack-progress-bar"><div class="pack-progress-fill" id="fill-${pack.id}" style="width:0%"></div></div>
      <div class="pack-count" id="count-${pack.id}"><span class="pack-loading">Open to load…</span></div>
    </div>
  `).join('');

  grid.innerHTML = lifeListPill + packPills;
}

// Load pack counts — only called when user opens the packs panel
async function loadPackCounts() {
  for (const pack of PACKS) {
    (async () => {
      const myBirds = await getBirdsForPack(pack.id);
      const userCount = new Set(myBirds.map(b => b.speciesCode || b.commonName)).size;
      const codes = await getRegionSpeciesCodes(pack.id);
      const total = codes.length;
      const pct = total ? Math.round((userCount / total) * 100) : 0;

      const countEl = document.getElementById(`count-${pack.id}`);
      const fillEl = document.getElementById(`fill-${pack.id}`);
      if (countEl) countEl.innerHTML = total
        ? `<strong>${userCount}</strong> / ${total.toLocaleString()} species &nbsp;·&nbsp; ${pct}%`
        : `<strong>${userCount}</strong> species`;
      if (fillEl) fillEl.style.width = `${pct}%`;
    })();
  }
}

async function renderPacks() {
  // Legacy — now handled by renderPackShells + loadPackCounts
  renderPackShells();
}

async function filterByPack(packId) {
  const packEl = document.getElementById(`pack-${packId}`);

  // Life List — always resets to full collection
  if (packId === 'lifelist') {
    currentPackId = 'lifelist';
    packState = null;
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
    packEl.classList.add('active');
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    activeFilter = 'all';
    renderGallery(applyFiltersAndSort(allBirds));
    return;
  }

  if (currentPackId === packId) {
    // Clicking active pack again returns to Life List
    currentPackId = 'lifelist';
    packState = null;
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
    document.getElementById('pack-lifelist').classList.add('active');
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    activeFilter = 'all';
    renderGallery(applyFiltersAndSort(allBirds));
    return;
  }

  currentPackId = packId;
  document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
  packEl.classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

  const pack = PACKS.find(p => p.id === packId);
  if (!pack) return;

  document.getElementById('gallery').innerHTML = `
    <div class="loading-state">
      <div class="loading-title">Loading ${pack.name} pack…</div>
      <div class="loading-sub">Fetching species list from eBird</div>
    </div>`;

  const [myBirds, unseenSpecies] = await Promise.all([
    getBirdsForPack(packId),
    (async () => {
      const myB = await getBirdsForPack(packId);
      return getUnseenForPack(packId, myB);
    })()
  ]);

  packState = { myBirds, unseenSpecies };
  renderPackGallery(myBirds, unseenSpecies, false);
}

function renderPackGallery(myBirds, unseenSpecies, showAll) {
  const GHOST_CAP = 50;
  const gallery = document.getElementById('gallery');

  const sorted = applyFiltersAndSort(myBirds);
  const seenCards = sorted.map(b => cardHTML(b, allBirds.indexOf(b))).join('');
  const ghosts = showAll ? unseenSpecies : unseenSpecies.slice(0, GHOST_CAP);
  const ghostCards = ghosts.map(s => ghostCardHTML(s)).join('');

  const showMore = !showAll && unseenSpecies.length > GHOST_CAP
    ? `<div class="show-more-wrap">
        <button class="show-more-btn" onclick="showAllGhosts()">
          Show ${(unseenSpecies.length - GHOST_CAP).toLocaleString()} more unseen species ▾
        </button>
       </div>`
    : '';

  gallery.innerHTML = seenCards + ghostCards + showMore;
  setupCardObserver();
}

function showAllGhosts() {
  if (packState) renderPackGallery(packState.myBirds, packState.unseenSpecies, true);
}

// ── Parse CSV ──
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const row = [];
    let inQ = false, cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ── Load data ──
const SHEET_CACHE_KEY = 'birdlist_csv_v7'; // bumped to clear stale cache
const SHEET_CACHE_TTL = 60 * 60 * 1000; // 1 hour

async function loadData() {
  const gallery = document.getElementById('gallery');
  try {
    let csvText = null;

    // Try localStorage cache first
    const cached = cacheGet(SHEET_CACHE_KEY, SHEET_CACHE_TTL);
    if (cached) {
      csvText = cached;
    } else {
      // Fetch fresh from Google Sheets
      const res = await fetch(SHEET_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      csvText = await res.text();
      cacheSet(SHEET_CACHE_KEY, csvText);
    }

    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error('Sheet appears empty');

    allBirds = rows.slice(1).map(r => ({
      date:        r[0]  || '',
      commonName:  r[1]  || '',
      sciName:     r[2]  || '',
      speciesCode: r[3]  || '',
      location:    r[4]  || '',
      country:     r[5]  ? r[5].split('-')[0] : '',  // 2-letter country code
      subCode:     r[5]  || '',                        // full subnational code e.g. US-NY
      locId:       r[6]  || '',
      taxonOrder:  r[7]  || '',
      family:      r[8]  || '',
      order:       r[9]  || '',
      globalFreq:  r[10] || '',
      rarity:      r[11] || 'Common',
      photoUrl:    r[12] || '',
      photoLicense:r[13] || '',
      exotic:      r[14] || '',
      subId:       r[15] || '',
    })).filter(b => b.commonName);

    // Stats
    const countries = new Set(allBirds.map(b => b.country.split('-')[0]).filter(Boolean));
    const rareCount = allBirds.filter(b => b.rarity === 'Rare' || b.rarity === 'Very Rare').length;
    // Count unique species not total sightings
    const uniqueSpecies = new Set(allBirds.map(b => b.speciesCode || b.commonName)).size;
    document.getElementById('stat-species').textContent = uniqueSpecies;
    document.getElementById('stat-countries').textContent = countries.size;
    document.getElementById('stat-rare').textContent = rareCount;
    document.getElementById('stats').style.display = 'flex';

    // World total async — non-blocking
    getRegionSpeciesCodes('world').then(codes => {
      if (codes.length) {
        document.getElementById('stat-species').textContent =
          `${uniqueSpecies} / ${codes.length.toLocaleString()}`;
      }
    });

    setupFilters();
    renderGallery(allBirds);

    // Show packs section but DON'T load pack counts yet —
    // defer until user actually opens the packs panel
    document.getElementById('packs-section').style.display = 'block';
    renderPackShells(); // render empty pack cards immediately
    packsLoaded = true;
    loadPackCounts(); // packs start open, so load counts immediately

  } catch(e) {
    gallery.innerHTML = `
      <div class="error-msg">
        <strong>Couldn't load your life list</strong>
        <p>Make sure the Google Sheet is published to the web as CSV.<br><br>Error: ${e.message}</p>
      </div>`;
  }
}

// ── Physical card tilt on mouse move ──
function addTiltEffect(el) {
  el.addEventListener('mousemove', function(e) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    const tiltX = dy * -8;
    const tiltY = dx * 8;
    el.style.transform = `translateY(-6px) scale(1.02) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  });

  el.addEventListener('mouseleave', function() {
    el.style.transform = '';
    el.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), filter 0.4s ease';
    setTimeout(() => { el.style.transition = ''; }, 400);
  });

  el.addEventListener('mouseenter', function() {
    el.style.transition = 'transform 0.1s ease, filter 0.15s ease';
  });
}

// Apply tilt to cards whenever the gallery DOM changes (avoids recursion)
const _galleryEl = document.getElementById('gallery');
if (_galleryEl) {
  const _tiltObserver = new MutationObserver(() => {
    document.querySelectorAll('.scene:not([data-tilt]), .stack-scene:not([data-tilt])').forEach(el => {
      el.setAttribute('data-tilt', '1');
      addTiltEffect(el);
    });
  });
  _tiltObserver.observe(_galleryEl, { childList: true, subtree: true });
}

loadData();
