<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life List — mvogts</title>
<!-- Preconnect to all external domains so DNS + TLS handshakes happen immediately -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://docs.google.com">
<link rel="preconnect" href="https://api.ebird.org">
<link rel="preconnect" href="https://en.wikipedia.org">
<link rel="preconnect" href="https://api.inaturalist.org">
<link rel="preconnect" href="https://inaturalist-open-data.s3.amazonaws.com">
<link rel="preconnect" href="https://cdn.download.ams.birds.cornell.edu">
<link rel="dns-prefetch" href="https://upload.wikimedia.org">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #111109;
    --bg2:        #1a1a14;
    --cream:      #f4edd8;
    --cream-dark: #e8dfc4;
    --gold:       #c8a84a;
    --gold-soft:  #8a7240;
    --ink:        #1e160a;
    --ink-soft:   #6a5830;
    --green:      #253320;
    --green-mid:  #3a5430;
    --green-text: #c8e0a8;
    --green-soft: #7a9a60;
  }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    padding: 48px 32px 32px;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-bottom: 8px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 700;
    color: var(--cream);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .stats {
    display: flex;
    gap: 32px;
    align-items: flex-end;
    flex-wrap: wrap;
  }

  .stat-block { text-align: right; }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label {
    font-size: 8px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-top: 3px;
  }

  .header-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, var(--gold-soft), transparent);
    opacity: 0.4;
  }

  /* ── CONTROLS BAR ── */
  .controls-bar {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 32px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }

  /* Search */
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 160px;
    max-width: 280px;
  }

  .search-input {
    width: 100%;
    background: #1a1a14;
    border: 1px solid #3a3020;
    color: var(--cream);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 7px 10px 7px 28px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }

  .search-input:focus { border-color: var(--gold-soft); }
  .search-input::placeholder { color: #4a4030; }

  .search-icon {
    position: absolute;
    left: 9px;
    top: 50%;
    transform: translateY(-50%);
    color: #4a4030;
    font-size: 10px;
    pointer-events: none;
  }

  /* Sort */
  .sort-select {
    background: #1a1a14;
    border: 1px solid #3a3020;
    color: #6a5830;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    padding: 7px 10px;
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  .sort-select:focus { border-color: var(--gold-soft); }

  /* Filter buttons */
  .filter-group {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
  }

  .filter-btn {
    background: transparent;
    border: 1px solid #3a3020;
    color: #6a5830;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--gold-soft); color: var(--gold); }
  .filter-btn.active { background: var(--gold-soft); border-color: var(--gold-soft); color: var(--cream); }

  /* ── PACKS ── */
  .packs-section {
    max-width: 1200px;
    margin: 0 auto 8px;
    padding: 0 32px;
  }

  .packs-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0 0 12px;
  }

  .packs-toggle-label {
    font-size: 8px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
  }

  .packs-toggle-arrow {
    font-size: 8px;
    color: var(--gold-soft);
    transition: transform 0.2s;
  }

  .packs-toggle.open .packs-toggle-arrow { transform: rotate(180deg); }

  .packs-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
  }

  .packs-grid.open { display: grid; }

  .pack-card {
    background: var(--bg2);
    border: 1px solid #2a2a1a;
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .pack-card:hover { border-color: var(--gold-soft); }
  .pack-card.active { border-color: var(--gold); background: #1e1c10; }

  .pack-type {
    font-size: 6px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #4a4030;
    margin-bottom: 4px;
  }

  .pack-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--cream);
    line-height: 1.1;
    margin-bottom: 8px;
  }

  .pack-progress-bar {
    width: 100%;
    height: 2px;
    background: #2a2a1a;
    border-radius: 1px;
    margin-bottom: 5px;
    overflow: hidden;
  }

  .pack-progress-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  .pack-count { font-size: 8px; color: var(--gold-soft); letter-spacing: 0.06em; }
  .pack-count strong { color: var(--gold); }
  .pack-loading { font-size: 8px; color: #4a4030; font-style: italic; }

  .packs-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, #2a2a1a, transparent);
    margin-bottom: 16px;
  }

  /* ── GALLERY ── */
  .gallery {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 18px;
  }

  /* ── CARD ── */
  .scene {
    aspect-ratio: 5 / 7.5;
    perspective: 1000px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .scene.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  /* FRONT */
  .card-front {
    background: var(--cream);
    border: 1px solid #c4a86a;
    display: flex;
    flex-direction: column;
    padding: 12px;
  }

  .card-eyebrow {
    font-size: 7px;
    letter-spacing: 0.16em;
    color: var(--gold-soft);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .card-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, #c4a86a, transparent);
    margin-bottom: 10px;
  }

  .photo-frame {
    flex: 1;
    position: relative;
    border-radius: 3px;
    overflow: hidden;
    background: var(--cream-dark);
    margin-bottom: 10px;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
  }

  .photo-frame::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(120,100,50,0.2) 100%);
    pointer-events: none;
  }

  .photo-credit {
    position: absolute;
    bottom: 4px;
    right: 6px;
    font-size: 6px;
    color: rgba(255,255,255,0.55);
    text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    z-index: 2;
  }

  .no-photo {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-soft);
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    line-height: 1.15;
  }

  .card-sci {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 9px;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 2px;
  }

  .card-sighting-label {
    font-size: 6px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-soft);
    margin-top: 6px;
    margin-bottom: 3px;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
  }

  .card-loc {
    font-size: 6px;
    color: var(--gold-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-date {
    font-size: 6px;
    color: var(--gold-soft);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .rarity-badge {
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .rarity-Common    { background: var(--green); color: var(--green-text); }
  .rarity-Uncommon  { background: #3a5020; color: #a8d080; }
  .rarity-Rare      { background: #5a2a10; color: #e09060; }
  .rarity-Very-Rare { background: #4a1030; color: #e080c0; }

  .corner {
    position: absolute;
    width: 18px;
    height: 18px;
    opacity: 0.35;
    pointer-events: none;
  }
  .corner svg { width: 100%; height: 100%; }
  .c-tl { top: 8px; left: 8px; }
  .c-tr { top: 8px; right: 8px; transform: scaleX(-1); }
  .c-bl { bottom: 8px; left: 8px; transform: scaleY(-1); }
  .c-br { bottom: 8px; right: 8px; transform: scale(-1); }

  /* BACK */
  .card-back {
    background: var(--green);
    border: 1px solid var(--green-mid);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    padding: 14px 12px;
  }

  .back-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 9px;
  }

  .back-name {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 700;
    color: #e8dcc0;
    line-height: 1.1;
  }

  .back-sci {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 8px;
    color: var(--green-soft);
    margin-top: 2px;
  }

  .back-rule {
    width: 100%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--green-mid), transparent);
    margin-bottom: 9px;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 12px;
    margin-bottom: 2px;
  }

  .stat-item-label {
    font-size: 6px;
    color: var(--green-soft);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .stat-item-value {
    font-size: 9px;
    color: var(--green-text);
    font-weight: 700;
    line-height: 1.2;
  }

  .back-desc {
    font-family: 'IM Fell English', serif;
    font-size: 11px;
    line-height: 1.6;
    color: #b8d098;
    flex: 1;
    margin-top: 4px;
  }

  .back-desc.loading { color: var(--green-soft); font-style: italic; font-size: 10px; }

  .sighting-footer {
    margin-top: 10px;
    padding-top: 9px;
    border-top: 1px solid #2a4020;
  }

  .sighting-label {
    font-size: 6px;
    color: var(--green-soft);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .sighting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .sighting-loc  { font-size: 8px; color: var(--green-text); }
  .sighting-date { font-size: 8px; color: var(--green-soft); }

  .back-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .back-footer span {
    font-size: 6px;
    color: #3a5030;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── LIGHTBOX MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8, 8, 6, 0.88);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 24px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .modal-card-wrap {
    position: relative;
    width: min(380px, 90vw);
    aspect-ratio: 5 / 7.5;
    animation: zoomIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes zoomIn {
    from { transform: scale(0.75); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  /* The modal card reuses all the same .card-face styles —
     we just scale it up inside the modal wrap */
  .modal-card-wrap .scene {
    width: 100%;
    height: 100%;
    aspect-ratio: unset;
  }

  .modal-close {
    position: absolute;
    top: -40px;
    right: 0;
    background: none;
    border: none;
    color: #6a5830;
    font-size: 22px;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--cream); }

  .modal-flip-btn {
    position: absolute;
    bottom: -44px;
    left: 50%;
    transform: translateX(-50%);
    background: transparent;
    border: 1px solid #3a3020;
    color: #6a5830;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .modal-flip-btn:hover { border-color: var(--gold-soft); color: var(--gold); }

  /* Larger text inside modal for readability */
  .modal-card-wrap .card-name     { font-size: 22px; }
  .modal-card-wrap .card-sci      { font-size: 12px; }
  .modal-card-wrap .card-eyebrow  { font-size: 9px; }
  .modal-card-wrap .card-loc,
  .modal-card-wrap .card-date     { font-size: 8px; }
  .modal-card-wrap .rarity-badge  { font-size: 8px; padding: 3px 8px; }
  .modal-card-wrap .card-sighting-label { font-size: 8px; }
  .modal-card-wrap .back-name     { font-size: 20px; }
  .modal-card-wrap .back-sci      { font-size: 11px; }
  .modal-card-wrap .stat-item-label { font-size: 8px; }
  .modal-card-wrap .stat-item-value { font-size: 13px; }
  .modal-card-wrap .back-desc     { font-size: 13px; line-height: 1.65; }
  .modal-card-wrap .sighting-loc,
  .modal-card-wrap .sighting-date { font-size: 10px; }
  .modal-card-wrap .sighting-label { font-size: 8px; }
  .modal-card-wrap .back-footer span { font-size: 8px; }
  .modal-card-wrap .photo-credit  { font-size: 8px; }

  /* ── GHOST CARDS ── */
  .ghost-scene { aspect-ratio: 5 / 7.5; cursor: default; }

  .ghost-card {
    width: 100%;
    height: 100%;
    border-radius: 10px;
    border: 1px dashed #252318;
    background: #141410;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
  }

  .ghost-silhouette {
    width: 56px;
    height: 56px;
    opacity: 0.07;
    margin-bottom: 14px;
  }

  .ghost-name {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    font-weight: 700;
    color: #302e20;
    text-align: center;
    line-height: 1.2;
  }

  .ghost-family {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 8px;
    color: #252318;
    text-align: center;
    margin-top: 4px;
  }

  .ghost-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #252318;
    border: 1px solid #252318;
    padding: 2px 6px;
    border-radius: 2px;
  }

  .ghost-unseen {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 6px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #252318;
  }

  /* Show more */
  .show-more-wrap {
    grid-column: 1 / -1;
    display: flex;
    justify-content: center;
    padding: 16px 0 8px;
  }

  .show-more-btn {
    background: transparent;
    border: 1px solid #3a3020;
    color: #6a5830;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .show-more-btn:hover { border-color: var(--gold-soft); color: var(--gold); }

  /* ── LOADING / ERROR ── */
  .loading-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--gold-soft);
    grid-column: 1 / -1;
  }

  .loading-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--cream);
    margin-bottom: 8px;
  }

  .loading-sub { font-size: 10px; letter-spacing: 0.1em; line-height: 1.8; }

  .error-msg {
    max-width: 480px;
    margin: 60px auto;
    text-align: center;
    padding: 32px;
    border: 1px solid #3a2010;
    border-radius: 4px;
    color: var(--gold-soft);
    grid-column: 1 / -1;
  }

  .error-msg strong { display: block; color: var(--cream); font-size: 14px; margin-bottom: 8px; }
  .error-msg p { font-size: 10px; line-height: 1.8; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 8px;
    color: #3a3020;
    letter-spacing: 0.08em;
    border-top: 1px solid #1e1e14;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .header { padding: 24px 16px 16px; }
    .gallery { padding: 0 12px 60px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .controls-bar { padding: 0 16px; }
    .packs-section { padding: 0 16px; }
    .stats { gap: 16px; }
    .stat-num { font-size: 22px; }
    .search-wrap { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="eyebrow">Field Guide Collection</div>
      <div class="title">Life List</div>
    </div>
    <div class="stats" id="stats" style="display:none">
      <div class="stat-block">
        <div class="stat-num" id="stat-species">—</div>
        <div class="stat-label">Species / World</div>
      </div>
      <div class="stat-block">

// ── LocalStorage cache helpers ──
function cacheSet(key, data) {
  try {
    localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {}
}

function cacheGet(key, ttl = CACHE_TTL) {
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > ttl) { localStorage.removeItem(key); return null; }
    return data;
  } catch(e) { return null; }
}

// ── eBird API with caching ──
async function ebirdFetch(path) {
  const cacheKey = 'ebird_' + path;
  const cached = cacheGet(cacheKey);
  if (cached) return cached;

  const res = await fetch(`https://api.ebird.org/v2${path}`, {
    headers: { 'X-eBirdApiToken': EBIRD_KEY }
  });
  if (!res.ok) return null;

  const isJson = res.headers.get('content-type')?.includes('json');
  const data = isJson ? await res.json() : await res.text();
  cacheSet(cacheKey, data);
  return data;
}

// Get species codes for a region (returns ordered array)
async function getRegionSpeciesCodes(regionCode) {
  const data = await ebirdFetch(`/product/spplist/${regionCode}`);
  return Array.isArray(data) ? data : [];
}

// Get full taxonomy (cached aggressively — changes rarely)
async function getTaxonomy() {
  const cacheKey = 'ebird_taxonomy';
  const cached = cacheGet(cacheKey, 7 * 24 * 60 * 60 * 1000); // 7 days
  if (cached) return cached;

  const data = await ebirdFetch(`/ref/taxonomy/ebird?fmt=json&locale=en`);
  if (!Array.isArray(data)) return [];
  const map = {};
  data.forEach(t => { map[t.speciesCode] = t; });
  cacheSet(cacheKey, map);
  return map;
}

// ── Determine which birds belong to a pack ──
async function getBirdsForPack(packId) {
  // Hotspot packs — exact locId match
  if (packId.startsWith('L')) {
    return allBirds.filter(b => b.locId === packId);
  }

  // All other packs — use loc ID region lookup with regionMatches helper
  return allBirds.filter(b => regionMatches(getRegionCode(b), packId));
}

// ── Build ghost cards for unseen species ──
async function getUnseenForPack(packId, myBirds) {
  const [codes, taxMap] = await Promise.all([
    getRegionSpeciesCodes(packId),
    getTaxonomy()
  ]);

  const mySpeciesCodes = new Set(myBirds.map(b => b.speciesCode).filter(Boolean));
  const myNames = new Set(myBirds.map(b => b.commonName.toLowerCase()));

  return codes
    .filter(code => {
      const t = taxMap[code];
      return t && t.category === 'species' &&
        !mySpeciesCodes.has(code) &&
        !myNames.has((t.comName || '').toLowerCase());
    })
    .map(code => taxMap[code]);
}

function countryName(code) { return COUNTRY_NAMES[code] || code || '—'; }

function daysSince(dateStr) {
  if (!dateStr) return null;
  const diff = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return '1 day ago';
  if (diff < 30) return `${diff} days ago`;
  if (diff < 365) return `${Math.floor(diff/30)}mo ago`;
  const y = Math.floor(diff/365);
  return `${y}yr${y > 1 ? 's' : ''} ago`;
}

function exoticLabel(code) {
  if (!code) return 'Native';
  if (code === 'N') return 'Naturalized';
  if (code === 'X') return 'Exotic';
  return 'Native';
}

function rarityClass(tier) {
  return 'rarity-' + (tier || 'Common').replace(/\s+/g, '-');
}

function formatDate(d) {
  if (!d) return '';
  const p = d.split('-');
  if (p.length !== 3) return d;
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${m[parseInt(p[1])-1]} ${parseInt(p[2])}, ${p[0]}`;
}

// ── Description cache ──
const descCache = {};

async function fetchDescription(sciName, commonName) {
  const key = sciName || commonName;
  if (descCache[key]) return descCache[key];

  for (const term of [sciName.replace(/ /g,'_'), commonName.replace(/ /g,'_')]) {
    try {
      const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(term)}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (data.extract && data.type !== 'disambiguation') {
        const sentences = data.extract.match(/[^.!?]+[.!?]+/g) || [];
        const desc = sentences.slice(0, 2).join(' ').trim();
        if (desc.length > 20) { descCache[key] = desc; return desc; }
      }
    } catch(e) {}
  }

  descCache[key] = 'A species recorded on your eBird life list.';
  return descCache[key];
}

// ── Filtering + sorting ──
const RARITY_ORDER = { 'Very Rare': 0, 'Rare': 1, 'Uncommon': 2, 'Common': 3, 'Unknown': 4 };

function applyFiltersAndSort(birds) {
  let result = [...birds];

  // Search
  if (activeSearch) {
    const q = activeSearch.toLowerCase();
    result = result.filter(b =>
      b.commonName.toLowerCase().includes(q) ||
      b.sciName.toLowerCase().includes(q) ||
      (b.family || '').toLowerCase().includes(q) ||
      (b.order || '').toLowerCase().includes(q)
    );
  }

  // Rarity filter
  if (activeFilter !== 'all') {
    result = result.filter(b => b.rarity === activeFilter);
  }

  // Sort
  switch(activeSort) {
    case 'name':
      result.sort((a,b) => a.commonName.localeCompare(b.commonName)); break;
    case 'date-asc':
      result.sort((a,b) => (a.date||'').localeCompare(b.date||'')); break;
    case 'date-desc':
      result.sort((a,b) => (b.date||'').localeCompare(a.date||'')); break;
    case 'rarity':
      result.sort((a,b) => (RARITY_ORDER[a.rarity]??3) - (RARITY_ORDER[b.rarity]??3)); break;
    case 'taxon':
      result.sort((a,b) => parseFloat(a.taxonOrder||9999) - parseFloat(b.taxonOrder||9999)); break;
  }

  return result;
}

function handleSearch() {
  activeSearch = document.getElementById('search-input').value.trim();
  currentPackId = null;
  document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
  renderGallery(applyFiltersAndSort(allBirds));
}

function handleSort() {
  activeSort = document.getElementById('sort-select').value;
  if (currentPackId && packState) {
    renderPackGallery(packState.myBirds, packState.unseenSpecies, false);
  } else {
    renderGallery(applyFiltersAndSort(allBirds));
  }
}

// ── Intersection Observer for lazy card photo loading ──
// Images only load when a card scrolls into the viewport
let cardObserver = null;

function setupCardObserver() {
  if (cardObserver) cardObserver.disconnect();
  cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target.querySelector('img[data-src]');
      if (img) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      cardObserver.unobserve(entry.target);
    });
  }, { rootMargin: '200px' }); // start loading 200px before entering viewport

  document.querySelectorAll('.scene').forEach(el => cardObserver.observe(el));
}

function renderGallery(birds) {
  const gallery = document.getElementById('gallery');
  if (!birds.length) {
    gallery.innerHTML = `<div class="error-msg"><strong>No cards found</strong><p>Try a different search or filter.</p></div>`;
    return;
  }
  gallery.innerHTML = birds.map((b, i) => cardHTML(b, allBirds.indexOf(b))).join('');
  setupCardObserver();
}

// ── Filters ──
function setupFilters() {
  document.getElementById('controls-bar').style.display = 'flex';
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      currentPackId = null;
      document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
      renderGallery(applyFiltersAndSort(allBirds));
    });
  });
}

// ── Packs ──
let packsOpen = false;
let packsLoaded = false;

function togglePacks() {
  packsOpen = !packsOpen;
  document.getElementById('packs-toggle').classList.toggle('open', packsOpen);
  document.getElementById('packs-grid').classList.toggle('open', packsOpen);

  // Lazy-load pack counts only when packs panel is first opened
  if (packsOpen && !packsLoaded) {
    packsLoaded = true;
    loadPackCounts();
  }
}

// Render pack shells immediately (no API calls) so layout is instant
function renderPackShells() {
  const grid = document.getElementById('packs-grid');
  grid.innerHTML = PACKS.map(pack => `
    <div class="pack-card" id="pack-${pack.id}" onclick="filterByPack('${pack.id}')">
      <div class="pack-type">${pack.emoji} ${pack.type}</div>
      <div class="pack-name">${pack.name}</div>
      <div class="pack-progress-bar"><div class="pack-progress-fill" id="fill-${pack.id}" style="width:0%"></div></div>
      <div class="pack-count" id="count-${pack.id}"><span class="pack-loading">Open to load…</span></div>
    </div>
  `).join('');
}

// Load pack counts — only called when user opens the packs panel
async function loadPackCounts() {
  for (const pack of PACKS) {
    (async () => {
      const myBirds = await getBirdsForPack(pack.id);
      const userCount = new Set(myBirds.map(b => b.speciesCode || b.commonName)).size;
      const codes = await getRegionSpeciesCodes(pack.id);
      const total = codes.length;
      const pct = total ? Math.round((userCount / total) * 100) : 0;

      const countEl = document.getElementById(`count-${pack.id}`);
      const fillEl = document.getElementById(`fill-${pack.id}`);
      if (countEl) countEl.innerHTML = total
        ? `<strong>${userCount}</strong> / ${total.toLocaleString()} species &nbsp;·&nbsp; ${pct}%`
        : `<strong>${userCount}</strong> species`;
      if (fillEl) fillEl.style.width = `${pct}%`;
    })();
  }
}

async function renderPacks() {
  // Legacy — now handled by renderPackShells + loadPackCounts
  renderPackShells();
}

async function filterByPack(packId) {
  const packEl = document.getElementById(`pack-${packId}`);

  if (currentPackId === packId) {
    currentPackId = null;
    packState = null;
    document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
    document.querySelector('.filter-btn[data-filter="all"]').classList.add('active');
    activeFilter = 'all';
    renderGallery(applyFiltersAndSort(allBirds));
    return;
  }

  currentPackId = packId;
  document.querySelectorAll('.pack-card').forEach(c => c.classList.remove('active'));
  packEl.classList.add('active');
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));

  const pack = PACKS.find(p => p.id === packId);
  if (!pack) return;

  document.getElementById('gallery').innerHTML = `
    <div class="loading-state">
      <div class="loading-title">Loading ${pack.name} pack…</div>
      <div class="loading-sub">Fetching species list from eBird</div>
    </div>`;

  const [myBirds, unseenSpecies] = await Promise.all([
    getBirdsForPack(packId),
    (async () => {
      const myB = await getBirdsForPack(packId);
      return getUnseenForPack(packId, myB);
    })()
  ]);

  packState = { myBirds, unseenSpecies };
  renderPackGallery(myBirds, unseenSpecies, false);
}

function renderPackGallery(myBirds, unseenSpecies, showAll) {
  const GHOST_CAP = 50;
  const gallery = document.getElementById('gallery');

  const sorted = applyFiltersAndSort(myBirds);
  const seenCards = sorted.map(b => cardHTML(b, allBirds.indexOf(b))).join('');
  const ghosts = showAll ? unseenSpecies : unseenSpecies.slice(0, GHOST_CAP);
  const ghostCards = ghosts.map(s => ghostCardHTML(s)).join('');

  const showMore = !showAll && unseenSpecies.length > GHOST_CAP
    ? `<div class="show-more-wrap">
        <button class="show-more-btn" onclick="showAllGhosts()">
          Show ${(unseenSpecies.length - GHOST_CAP).toLocaleString()} more unseen species ▾
        </button>
       </div>`
    : '';

  gallery.innerHTML = seenCards + ghostCards + showMore;
  setupCardObserver();
}

function showAllGhosts() {
  if (packState) renderPackGallery(packState.myBirds, packState.unseenSpecies, true);
}

// ── Parse CSV ──
function parseCSV(text) {
  const rows = [];
  for (const line of text.split(/\r?\n/)) {
    if (!line.trim()) continue;
    const row = [];
    let inQ = false, cur = '';
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    row.push(cur.trim());
    rows.push(row);
  }
  return rows;
}

// ── Load data ──
const SHEET_CACHE_KEY = 'birdlist_csv';
const SHEET_CACHE_TTL = 60 * 60 * 1000; // 1 hour

async function loadData() {
  const gallery = document.getElementById('gallery');
  try {
    let csvText = null;

    // Try localStorage cache first
    const cached = cacheGet(SHEET_CACHE_KEY, SHEET_CACHE_TTL);
    if (cached) {
      csvText = cached;
    } else {
      // Fetch fresh from Google Sheets
      const res = await fetch(SHEET_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      csvText = await res.text();
      cacheSet(SHEET_CACHE_KEY, csvText);
    }

    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error('Sheet appears empty');

    allBirds = rows.slice(1).map(r => ({
      date:        r[0]  || '',
      commonName:  r[1]  || '',
      sciName:     r[2]  || '',
      speciesCode: r[3]  || '',
      location:    r[4]  || '',
      country:     r[5]  ? r[5].split('-')[0] : '',  // 2-letter country code
      subCode:     r[5]  || '',                        // full subnational code e.g. US-NY
      locId:       r[6]  || '',
      taxonOrder:  r[7]  || '',
      family:      r[8]  || '',
      order:       r[9]  || '',
      globalFreq:  r[10] || '',
      rarity:      r[11] || 'Common',
      photoUrl:    r[12] || '',
      photoLicense:r[13] || '',
      exotic:      r[14] || '',
      subId:       r[15] || '',
    })).filter(b => b.commonName);

    // Stats
    const countries = new Set(allBirds.map(b => b.country).filter(Boolean));
    const rareCount = allBirds.filter(b => b.rarity === 'Rare' || b.rarity === 'Very Rare').length;
    document.getElementById('stat-species').textContent = allBirds.length;
    document.getElementById('stat-countries').textContent = countries.size;
    document.getElementById('stat-rare').textContent = rareCount;
    document.getElementById('stats').style.display = 'flex';

    // World total async — non-blocking
    getRegionSpeciesCodes('world').then(codes => {
      if (codes.length) {
        document.getElementById('stat-species').textContent =
          `${allBirds.length} / ${codes.length.toLocaleString()}`;
      }
    });

    setupFilters();
    renderGallery(allBirds);

    // Show packs section but DON'T load pack counts yet —
    // defer until user actually opens the packs panel
    document.getElementById('packs-section').style.display = 'block';
    renderPackShells(); // render empty pack cards immediately

  } catch(e) {
    gallery.innerHTML = `
      <div class="error-msg">
        <strong>Couldn't load your life list</strong>
        <p>Make sure the Google Sheet is published to the web as CSV.<br><br>Error: ${e.message}</p>
      </div>`;
  }
}

loadData();
</script>
